name: Playwright Automation Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      matrix:
        python-version: ['3.12']
        browser: ['chromium', 'firefox', 'webkit']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Playwright browsers
      run: playwright install
    
    - name: Run linting
      run: |
        black --check .
        isort --check-only .
        flake8 . --count --statistics
        mypy core tests
      continue-on-error: true
    
    - name: Run tests
      run: |
        pytest tests/ \
          -v \
          --tb=short \
          --html=reports/report_${{ matrix.browser }}.html \
          --self-contained-html \
          --cov=core \
          --cov-report=html:reports/coverage_${{ matrix.browser }} \
          -k "not slow" \
          --browser=${{ matrix.browser }}
      env:
        HEADLESS: "true"
    
    - name: Run performance tests
      run: |
        pytest tests/ \
          -v \
          -m "performance" \
          --benchmark-only \
          --benchmark-json=reports/benchmark_${{ matrix.browser }}.json
      continue-on-error: true
    
    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-reports-${{ matrix.browser }}
        path: reports/
        retention-days: 30
    
    - name: Upload coverage
      if: always()
      uses: codecov/codecov-action@v3
      with:
        files: ./reports/coverage_*/index.html
        flags: unittests
        verbose: true
    
    - name: Comment PR with test results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const reportPath = `./reports/report_${{ matrix.browser }}.html`;
          if (fs.existsSync(reportPath)) {
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Test Results - ${{ matrix.browser }}\n✅ Tests completed. [View detailed report](./reports/report_${{ matrix.browser }}.html)`
            });
          }

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8 mypy pylint
    
    - name: Code formatting check
      run: |
        black --check .
        isort --check-only .
    
    - name: Linting
      run: flake8 . --max-line-length=120 --statistics
    
    - name: Type checking
      run: mypy core tests
      continue-on-error: true

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install bandit
      run: pip install bandit
    
    - name: Security scan
      run: bandit -r core tests -f json -o reports/bandit-report.json
      continue-on-error: true
    
    - name: Upload security report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: reports/bandit-report.json
