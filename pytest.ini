[tool:pytest]
# Pytest configuration for professional Playwright framework

# Basic settings
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    smoke: Quick smoke tests
    regression: Regression test suite
    e2e: End-to-end tests
    api: API tests
    ui: UI tests
    performance: Performance tests
    accessibility: Accessibility tests
    security: Security tests
    mobile: Mobile tests
    visual: Visual regression tests
    slow: Slow running tests
    flaky: Tests that may be unstable
    skip_ci: Skip in CI environment
    quarantine: Tests under investigation

# Test execution settings
addopts =
    --strict-markers
    --strict-config
    --disable-warnings
    --tb=short
    -ra
    --asyncio-mode=auto

# Parallel execution (can be overridden)
# -n auto

# Coverage settings
# --cov=core
# --cov=tests
# --cov-report=html:reports/coverage
# --cov-report=xml:reports/coverage.xml
# --cov-report=term-missing
# --cov-fail-under=80

# Reporting
# --html=reports/html-report/index.html
# --junitxml=reports/junit-xml/results.xml
# --alluredir=reports/allure-results

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# File logging
log_file = reports/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s (%(filename)s:%(lineno)s): %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Test discovery
norecursedirs =
    .git
    .tox
    .env
    venv
    env
    node_modules
    .pytest_cache
    __pycache__
    reports
    logs
    .vscode
    .idea

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
    ignore::ResourceWarning

# Timeout settings
timeout = 300
timeout_method = thread

# Cache settings
cache_dir = .pytest_cache

# Doctest settings
doctest_plus = enabled
doctest_encoding = utf-8

# Mock settings
mock_traceback_monkeypatch = false

# xfail strict mode
xfail_strict = true

# Run tests in random order to catch dependencies
# random_order = true

# Screenshot on failure (custom plugin)
# screenshot_on_failure = true

# Video recording
# video_on_failure = true

# Performance monitoring
# performance_monitoring = true

# Accessibility checking
# accessibility_check = true

# Security scanning
# security_scan = true
